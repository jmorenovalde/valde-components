<button
  class="btn btn-{{ outline ? 'outline-' + buttonStyle : buttonStyle }}"
  [ngClass]="{
    'btn-sm': size === 'small',
    'btn-lg': size === 'large'
  }"
  [disabled]="disabled"
  type="button"
  (click)="clicked($event)"
>
  <span *ngIf="icon" class="bi bi-{{ icon }}"></span>
  {{ label }}
</button>
