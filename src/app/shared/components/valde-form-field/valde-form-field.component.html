<div class="mb-3">
  <label [for]="id" class="form-label">{{ label }}</label>
  <ng-container *ngIf="type === 'number'; else otherType">
    <input
      autocomplete="false"
      class="form-control"
      [disabled]="disabled"
      [id]="id"
      [max]="max"
      [min]="min"
      [ngClass]="{ 'border border-danger': !isValid }"
      [placeholder]="placeholder"
      [readonly]="readonly"
      [step]="step"
      [type]="type"
      [value]="valueToShow"
      (blur)="onBlurNumbers($event)"
      (keyup)="onKeyupNumbers($event)"
    />
    <small
      *ngIf="!isValid"
      class="
        tooltip-error
        badge
        mb-3
        px-2
        py-1
        fw-semibold
        text-white
        bg-danger bg-opacity-75
        border border-danger
        rounded-2
      "
      >The number is not valid</small
    >
  </ng-container>
</div>
<ng-template #otherType>
  <input
    autocomplete="false"
    class="form-control"
    [disabled]="disabled"
    [id]="id"
    [placeholder]="placeholder"
    [readonly]="readonly"
    [type]="type"
    [value]="valueToShow"
    (blur)="onBlur($event)"
    (keyup)="onKeyup($event)"
  />
</ng-template>
